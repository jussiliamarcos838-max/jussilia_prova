<h2>Produtos Cadastrados</h2>

<table>

<thead>
<tr>
<th>Produto</th>
<th>Quantidade</th>
<th>Preço</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

<a class="voltar" href="t2.html">Cadastrar Novo Produto</a>

<script>

let produtos = JSON.parse(localStorage.getItem("produtos")) || [];

let tabela = document.getElementById("tabela");

function renderizarTabela() {
    tabela.innerHTML = ""; // Limpa a tabela antes de renderizar
    produtos.forEach(function(p, index){
        tabela.innerHTML += `
        <tr>
            <td>${p.nome}</td>
            <td>${p.quantidade}</td>
            <td>${p.preco}</td>
            <td><button class="excluir" onclick="excluirProduto(${index})">Excluir</button></td>
        </tr>
        `;
    });
}

function excluirProduto(index) {
    produtos.splice(index, 1); // Remove o produto do array
    localStorage.setItem("produtos", JSON.stringify(produtos)); // Atualiza o localStorage
    renderizarTabela(); // Atualiza a tabela
}

// Renderiza a tabela inicialmente
renderizarTabela();

</script>

</body>
