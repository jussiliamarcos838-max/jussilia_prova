<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I Trimestre</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #ecfeff, #cffafe);
      min-height: 100vh;
      color: #134e4a;
    }

 
    .cabecalho {
      background: #0f766e;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    }

    .cabecalho h1 a {
      text-decoration: none;
      color: #fff;
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .menu {
      display: flex;
      gap: 12px;
    }

    .menu a {
      text-decoration: none;
      padding: 10px 18px;
      background: #14b8a6;
      color: #fff;
      border-radius: 25px;
      font-size: 14px;
      font-weight: 600;
      transition: 0.3s;
    }

    .menu a:hover {
      background: #99f6e4;
      color: #065f46;
      transform: scale(1.05);
    }
 
    main {
      padding: 80px 20px;
      display: flex;
      justify-content: center;
    }

    .box-trimestre {
      background: #ffffff;
      max-width: 800px;
      width: 100%;
      padding: 50px 40px;
      border-radius: 25px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.15);
      text-align: center;
    }

    .box-trimestre h2 {
      font-size: 30px;
      color: #0f766e;
      margin-bottom: 30px;
    }
 
  </style>
</head>

<body>

  <header class="cabecalho">

    <nav class="menu">

      <a href="trimestre3.html">III Trimestre</a>
    </nav>
  </header>

  <main>
    <div class="box-trimestre">
       
    </div>
  </main>

</body>
</html>
