<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Registro - Sistema Acadêmico</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background-color:#f5f0e6;
        }

        header{
            background-color:#5c4033;
            padding:20px;
            text-align:center;
        }

        header a{
            text-decoration:none;
            background-color:#8b5a2b;
            color:white;
            padding:10px 30px;
            border-radius:8px;
            font-weight:bold;
            transition:0.3s;
        }

        header a:hover{
            background-color:#6b4423;
        }

        .container-principal{
            max-width:550px;
            margin:40px auto;
            padding:30px;
            background-color:#ffffff;
            border-radius:12px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            color:#5c4033;
            margin-bottom:10px;
        }

        .subtitulo{
            text-align:center;
            color:#8b5a2b;
            margin-bottom:25px;
            font-size:14px;
        }

        .info-notas{
            background-color:#e6ffe6;
            border-left:4px solid #5c4033;
            padding:12px;
            border-radius:8px;
            margin-bottom:25px;
            font-size:13px;
            line-height:1.6;
        }

        .info-notas strong{
            color:#5c4033;
        }

        .campo{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
            color:#5c4033;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ddd;
            border-radius:8px;
            font-size:14px;
            transition:0.3s;
        }

        input:focus{
            outline:none;
            border-color:#8b5a2b;
            box-shadow:0 0 5px rgba(139,90,43,0.3);
        }

        .btn{
            display:block;
            width:100%;
            padding:12px;
            background-color:#8b5a2b;
            color:white;
            text-decoration:none;
            border-radius:8px;
            font-size:16px;
            font-weight:bold;
            text-align:center;
            border:none;
            cursor:pointer;
            transition:0.3s;
            margin-top:10px;
        }

        .btn:hover{
            background-color:#5c4033;
            transform:scale(1.02);
        }

        .navegacao{
            display:flex;
            gap:15px;
            margin-top:25px;
        }

        .nav-link{
            flex:1;
            text-align:center;
            padding:10px;
            background-color:#e0d6c8;
            color:#5c4033;
            text-decoration:none;
            border-radius:8px;
            font-weight:bold;
            transition:0.3s;
        }

        .nav-link:hover{
            background-color:#8b5a2b;
            color:white;
        }

        @media (max-width:600px){
            .container-principal{
                margin:20px;
                padding:20px;
            }
            .navegacao{
                flex-direction:column;
            }
        }
    </style>
</head>

<body>

    <header>
        <a href="ttt1.html">Registro Acadêmico</a>
    </header>

    <div class="container-principal">
        <h2>Cadastro de Estudante</h2>
        <div class="subtitulo">Preencha os dados abaixo</div>

        

        <form id="formEstudante">
            <div class="campo">
                <label>Nome completo</label>
                <input type="text" id="nome" required placeholder="Digite o nome do estudante">
            </div>
            <div class="campo">
                <label>Disciplina</label>
                <input type="text" id="disciplina" required placeholder="Ex: Matemática, Português">
            </div>
            <div class="campo">
                <label>1 Trimestre </label>
                <input type="number" id="nota1" step="0.1" min="0" max="20" required>
            </div>
            <div class="campo">
                <label>2Trimestre </label>
                <input type="number" id="nota2" step="0.1" min="0" max="20" required>
            </div>
            <div class="campo">
                <label>3 Trimestre</label>
                <input type="number" id="nota3" step="0.1" min="0" max="20" required>
            </div>
            <button type="submit" class="btn">Adicionar Estudante</button>
        </form>

        <div class="navegacao">
            <a href="ttt2.html" class="nav-link">Lista de Estudantes</a>
            <a href="ttt3.html" class="nav-link">Resultados da Turma</a>
        </div>
    </div>

    <script>
        function obterEstudantes() {
            const salvo = localStorage.getItem('estudantes_academicos');
            return salvo ? JSON.parse(salvo) : [];
        }

        function salvarEstudantes(estudantes) {
            localStorage.setItem('estudantes_academicos', JSON.stringify(estudantes));
        }

        document.getElementById('formEstudante').addEventListener('submit', function(e) {
            e.preventDefault();

            const nome = document.getElementById('nome').value.trim();
            const disciplina = document.getElementById('disciplina').value.trim();
            const nota1 = parseFloat(document.getElementById('nota1').value);
            const nota2 = parseFloat(document.getElementById('nota2').value);
            const nota3 = parseFloat(document.getElementById('nota3').value);

            if (!nome || !disciplina) {
                alert('Preencha nome e disciplina!');
                return;
            }

            if (isNaN(nota1) || isNaN(nota2) || isNaN(nota3)) {
                alert('Preencha todas as notas!');
                return;
            }

            if (nota1 < 0 || nota1 > 20 || nota2 < 0 || nota2 > 20 || nota3 < 0 || nota3 > 20) {
                alert('As notas devem estar entre 0 e 20!');
                return;
            }

            const estudantes = obterEstudantes();
            estudantes.push({ nome, disciplina, nota1, nota2, nota3 });
            salvarEstudantes(estudantes);

            this.reset();
            alert('Estudante cadastrado com sucesso!');
        });
    </script>

</body>
</html>
