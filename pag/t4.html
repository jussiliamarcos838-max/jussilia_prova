<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T4 - Conteúdo Completo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background-color:#f5f0e6;
}

/* HEADER */
header{
    background-color:#5c4033;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h1 a{
    color:white;
    text-decoration:none;
}

nav{
    display:flex;
    gap:10px;
}

nav a{
    text-decoration:none;
    padding:8px 16px;
    background-color:#8b5a2b;
    color:white;
    border-radius:6px;
    font-weight:bold;
    transition:0.3s;
}

nav a:hover{
    background-color:#3e2723;
}

/* CONTEÚDO */
.conteudo{
    width:85%;
    margin:40px auto;
    display:flex;
    flex-direction:column;
    gap:30px;
}

/* CAIXAS ORGANIZADAS */
.caixa{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.caixa h2{
    color:#5c4033;
    margin-bottom:15px;
    text-align:center;
}

img, video, audio{
    width:100%;
    border-radius:10px;
}

/* FORM */
label{
    font-weight:bold;
    color:#5c4033;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0 15px;
    border-radius:6px;
    border:1px solid #ccc;
}

input:focus{
    border-color:#8b5a2b;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    background-color:#8b5a2b;
    color:white;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background-color:#5c4033;
}

/* TABELA */
table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    border:1px solid #ccc;
    padding:12px;
    text-align:center;
}

th{
    background-color:#8b5a2b;
    color:white;
}

tr:nth-child(even){
    background-color:#f2ebe5;
}

</style>
</head>

<body>

<header>
  <h1><a href="../index.html">INÍCIO</a></h1>

  <nav>
    <a href="trimestre1.html">Iº Trimestre</a>
    <a href="trimestre2.html">IIº Trimestre</a>
    <a href="trimestre3.html">IIIº Trimestre</a>
  </nav>
</header>

<div class="conteudo">

  <!-- MULTIMÉDIA -->
  <div class="caixa">
    <h2>Ficheiros Multimédia</h2>

    <img src="../files/a.jpg" alt="Imagem do trabalho">

    <br><br>

    <video src="../files/Diboba_-_Dont_Play_(_Danny_Peezy_x_Tio_Edson_x_Mc_Cabinda_X_Uami_Ndongadas_)_Video_Oficial(720p).mp4" controls></video>

    <br><br>

    <audio src="../files/01. Anderson Mário - Pobreza (Dj Salaujei DASP na Promo).mp3" controls></audio>
  </div>

  <!-- CADASTRO -->
  <div class="caixa">
    <h2>Cadastro de Produtos</h2>

    <form id="formProduto">
      <label>Nome do Produto</label>
      <input type="text" id="nome" required>

      <label>Preço</label>
      <input type="number" id="preco" required>

      <label>Quantidade</label>
      <input type="number" id="quantidade" required>

      <button type="submit">Cadastrar</button>
    </form>
  </div>

  <!-- TABELA -->
  <div class="caixa">
    <h2>Produtos Cadastrados</h2>

    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Preço</th>
          <th>Quantidade</th>
        </tr>
      </thead>
      <tbody id="tabelaProdutos"></tbody>
    </table>
  </div>

</div>

<script>
const form = document.getElementById("formProduto");
const tabela = document.getElementById("tabelaProdutos");

function carregarTabela() {
    tabela.innerHTML = "";
    const produtos = JSON.parse(localStorage.getItem("produtos")) || [];

    produtos.forEach(produto => {
        const linha = document.createElement("tr");
        linha.innerHTML = `
            <td>${produto.nome}</td>
            <td>${produto.preco}</td>
            <td>${produto.quantidade}</td>
        `;
        tabela.appendChild(linha);
    });
}

form.addEventListener("submit", function(e) {
    e.preventDefault();

    const produto = {
        nome: nome.value,
        preco: preco.value,
        quantidade: quantidade.value
    };

    let produtos = JSON.parse(localStorage.getItem("produtos")) || [];
    produtos.push(produto);
    localStorage.setItem("produtos", JSON.stringify(produtos));

    form.reset();
    carregarTabela();
});

carregarTabela();
</script>

</body>
  </html>  </header>

  <main>
    <div class="box-trimestre">
       
    </div>
  </main>

</body>
</html>
