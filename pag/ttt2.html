<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Lista - Sistema Acadêmico</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background-color:#f5f0e6;
        }

        header{
            background-color:#5c4033;
            padding:20px;
            text-align:center;
        }

        header a{
            text-decoration:none;
            background-color:#8b5a2b;
            color:white;
            padding:10px 30px;
            border-radius:8px;
            font-weight:bold;
            transition:0.3s;
        }

        header a:hover{
            background-color:#6b4423;
        }

        .container-principal{
            max-width:1300px;
            margin:40px auto;
            padding:30px;
            background-color:#ffffff;
            border-radius:12px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            color:#5c4033;
            margin-bottom:10px;
        }

        .subtitulo{
            text-align:center;
            color:#8b5a2b;
            margin-bottom:25px;
            font-size:14px;
        }

        .btn-limpar{
            background-color:#8b5a2b;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
            margin-bottom:25px;
            transition:0.3s;
        }

        .btn-limpar:hover{
            background-color:#5c4033;
        }

        .tabela-wrapper{
            overflow-x:auto;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th, td{
            padding:14px;
            text-align:left;
            border-bottom:1px solid #e0d6c8;
        }

        th{
            background-color:#f5f0e6;
            color:#5c4033;
            font-weight:bold;
        }

        tr:hover{
            background-color:#faf7f2;
        }

        .btn-excluir{
            background-color:#a0522d;
            color:white;
            border:none;
            padding:5px 12px;
            border-radius:6px;
            cursor:pointer;
            transition:0.3s;
        }

        .btn-excluir:hover{
            background-color:#5c4033;
        }

        .status-aprovado{
            background-color:#e6ffe6;
            color:#2d6a2d;
            padding:4px 10px;
            border-radius:20px;
            display:inline-block;
            font-size:12px;
        }

        .status-recuperacao{
            background-color:#fff3cd;
            color:#856404;
            padding:4px 10px;
            border-radius:20px;
            display:inline-block;
            font-size:12px;
        }

        .status-reprovado{
            background-color:#f8d7da;
            color:#721c24;
            padding:4px 10px;
            border-radius:20px;
            display:inline-block;
            font-size:12px;
        }

        .navegacao{
            display:flex;
            gap:15px;
            margin-top:25px;
        }

        .nav-link{
            flex:1;
            text-align:center;
            padding:10px;
            background-color:#e0d6c8;
            color:#5c4033;
            text-decoration:none;
            border-radius:8px;
            font-weight:bold;
            transition:0.3s;
        }

        .nav-link:hover{
            background-color:#8b5a2b;
            color:white;
        }

        .info{
            text-align:center;
            margin-top:20px;
            color:#8b5a2b;
            font-weight:bold;
        }

        @media (max-width:768px){
            .container-principal{
                margin:20px;
                padding:20px;
            }
            th, td{
                padding:8px;
                font-size:12px;
            }
            .navegacao{
                flex-direction:column;
            }
        }
    </style>
</head>

<body>

    <header>
        <a href="ttt1.html">Registro Acadêmico</a>
    </header>

    <div class="container-principal">
        <h2>Relação de Estudantes</h2>
        <div class="subtitulo">Todos os alunos matriculados</div>

        <button class="btn-limpar" onclick="limparTodos()">Limpar todos os registros</button>

        <div class="tabela-wrapper">
            <table id="tabelaEstudantes">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Disciplina</th>
                        <th>1º Tri</th>
                        <th>2º Tri</th>
                        <th>3º Tri</th>
                        <th>Média</th>
                        <th>Situação</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela">
                    <tr><td colspan="8" style="text-align:center;">Nenhum estudante cadastrado</td</tr>
                </tbody>
            </table>
        </div>

        <div class="navegacao">
            <a href="ttt1.html" class="nav-link">Novo Cadastro</a>
            <a href="ttt3.html" class="nav-link">Resultados da Turma</a>
        </div>
        <div class="info" id="infoTotal"></div>
    </div>

    <script>
        function obterEstudantes() {
            const salvo = localStorage.getItem('estudantes_academicos');
            return salvo ? JSON.parse(salvo) : [];
        }

        function salvarEstudantes(estudantes) {
            localStorage.setItem('estudantes_academicos', JSON.stringify(estudantes));
        }

        function calcularMedia(n1, n2, n3) {
            return (n1 + n2 + n3) / 3;
        }

        function obterSituacao(media) {
            if (media >= 10) return 'Aprovado';
            if (media >= 8) return 'Recuperação';
            return 'Reprovado';
        }

        function obterClasseSituacao(situacao) {
            if (situacao === 'Aprovado') return 'status-aprovado';
            if (situacao === 'Recuperação') return 'status-recuperacao';
            return 'status-reprovado';
        }

        function atualizarTabela() {
            const estudantes = obterEstudantes();
            const corpo = document.getElementById('corpoTabela');
            const info = document.getElementById('infoTotal');

            info.textContent = `Total de estudantes: ${estudantes.length}`;

            if (estudantes.length === 0) {
                corpo.innerHTML = '<tr><td colspan="8" style="text-align:center;">Nenhum estudante cadastrado</td</td>';
                return;
            }

            corpo.innerHTML = estudantes.map((est, indice) => {
                const media = calcularMedia(est.nota1, est.nota2, est.nota3);
                const situacao = obterSituacao(media);
                const classeSituacao = obterClasseSituacao(situacao);
                return `
                    <tr>
                        <td>${est.nome}</td>
                        <td>${est.disciplina}</td>
                        <td>${est.nota1.toFixed(1)}</td>
                        <td>${est.nota2.toFixed(1)}</td>
                        <td>${est.nota3.toFixed(1)}</td>
                        <td><strong>${media.toFixed(1)}</strong></td>
                        <td><span class="${classeSituacao}">${situacao}</span></td>
                        <td><button class="btn-excluir" onclick="excluirEstudante(${indice})">Excluir</button></td>
                    </tr>
                `;
            }).join('');
        }

        function excluirEstudante(indice) {
            if (confirm('Deseja realmente excluir este estudante?')) {
                const estudantes = obterEstudantes();
                estudantes.splice(indice, 1);
                salvarEstudantes(estudantes);
                atualizarTabela();
            }
        }

        function limparTodos() {
            if (confirm('ATENÇÃO! Esta ação removerá todos os estudantes. Continuar?')) {
                localStorage.removeItem('estudantes_academicos');
                atualizarTabela();
            }
        }

        atualizarTabela();
    </script>

</body>
</html>
